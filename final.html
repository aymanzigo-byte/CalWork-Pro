<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CalWork Pro</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* الترس والعداد */
        #settings-btn { position: absolute; top: 20px; left: 20px; font-size: 30px; cursor: pointer; color: #444; }
        #timer { font-size: 4.5rem; color: #00d2ff; font-weight: bold; margin-bottom: 30px; }
        
        /* الأزرار الرئيسية */
        .btns { display: flex; gap: 40px; }
        .b { width: 90px; height: 90px; border-radius: 50%; border: none; color: #fff; font-weight: bold; font-size: 1.2rem; }
        #in { background: #2ecc71; }
        #out { background: #ff4b2b; opacity: 0.3; }

        /* شاشة الإعدادات والتقويم (مخفية تماماً) */
        #overlay { 
            position: fixed; inset: 0; background: #000; 
            display: none; /* مخفي افتراضياً */
            flex-direction: column; padding: 20px; z-index: 9999; 
        }
        .close { font-size: 40px; color: red; align-self: flex-end; padding: 10px; }
        .box { background: #111; padding: 20px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #222; }
        
        /* التقويم */
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .day { background: #222; padding: 10px 0; text-align: center; border-radius: 5px; font-size: 0.8rem; }
        .day.active { color: #2ecc71; border: 1px solid #2ecc71; }
    </style>
</head>
<body onload="init()">

    <div id="settings-btn" onclick="openMenu()">⚙️</div>

    <div id="timer">00:00:00</div>
    
    <div class="btns">
        <button id="in" class="b" onclick="action('in')">IN</button>
        <button id="out" class="b" onclick="action('out')">OUT</button>
    </div>

    <div id="overlay">
        <div class="close" onclick="closeMenu()">✕</div>
        
        <div class="box">
            <h3 onclick="toggleCal()">📅 عرض التقويم والسجل</h3>
            <div id="calCont" style="display:none">
                <div id="calTitle" style="text-align:center; color:#00d2ff; margin-bottom:10px"></div>
                <div class="grid" id="grid"></div>
            </div>
        </div>

        <div class="box">
            <p>إيميل البيانات:</p>
            <input type="email" id="email" onchange="localStorage.setItem('mail', this.value)" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:#fff; text-align:center">
        </div>
    </div>

    <script>
        let sec = 0, t, logs = JSON.parse(localStorage.getItem('calwork_db')) || {};
        const url = "https://script.google.com/macros/s/AKfycbyBms8jZPDMWeTdZCFySH9nnegrHRAX37bXZ4FDxaqCr52AjD5dSkTaOpZXS4tMtkq0/exec";

        function init() {
            document.getElementById('email').value = localStorage.getItem('mail') || "";
            if(localStorage.getItem('isWorkingTime')) {
                let start = new Date(localStorage.getItem('isWorkingTime'));
                sec = Math.floor((new Date() - start) / 1000);
                runUI();
            }
        }

        function action(type) {
            if(type === 'in') {
                localStorage.setItem('isWorkingTime', new Date());
                runUI();
            } else {
                let start = new Date(localStorage.getItem('isWorkingTime'));
                let now = new Date();
                let dur = (sec/3600).toFixed(2);
                logs[`${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`] = {in: start.toLocaleTimeString(), out: now.toLocaleTimeString()};
                localStorage.setItem('calwork_db', JSON.stringify(logs));
                
                fetch(url, {method:"POST", mode:"no-cors", body: JSON.stringify({date: start.toLocaleDateString(), in: start.toLocaleTimeString(), out: now.toLocaleTimeString(), duration: dur, email: localStorage.getItem('mail')})});
                
                localStorage.removeItem('isWorkingTime');
                alert("تم الحفظ والإرسال ✅");
                location.reload();
            }
        }

        function runUI() {
            document.getElementById('in').style.opacity = '0.3';
            document.getElementById('out').style.opacity = '1';
            t = setInterval(() => {
                sec++;
                let h=Math.floor(sec/3600).toString().padStart(2,'0'),
                    m=Math.floor((sec%3600)/60).toString().padStart(2,'0'),
                    s=(sec%60).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function openMenu() { document.getElementById('overlay').style.display = 'flex'; }
        function closeMenu() { document.getElementById('overlay').style.display = 'none'; }
        
        function toggleCal() {
            let c = document.getElementById('calCont');
            c.style.display = c.style.display === 'none' ? 'block' : 'none';
            if(c.style.display === 'block') {
                let g = document.getElementById('grid'); g.innerHTML = "";
                let now = new Date();
                document.getElementById('calTitle').innerText = (now.getMonth()+1) + " / " + now.getFullYear();
                let last = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
                for(let i=1; i<=last; i++) {
                    let d = document.createElement('div'); d.className = 'day'; d.innerText = i;
                    if(logs[`${now.getFullYear()}-${now.getMonth()+1}-${i}`]) d.className = 'day active';
                    g.appendChild(d);
                }
            }
        }
    </script>
</body>
</html>

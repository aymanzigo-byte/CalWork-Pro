<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalWork Pro | V18.5</title>
    <style>
        :root { --primary: #00d2ff; --bg: #000; --card: #121212; --success: #2ecc71; --danger: #ff4b2b; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        /* شاشة البداية */
        #splash { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; }

        /* الواجهة الرئيسية */
        .container { display: flex; flex-direction: column; align-items: center; width: 100%; padding-top: 50px; }
        
        /* العداد */
        #work-timer { font-size: 4rem; color: var(--primary); font-weight: bold; margin: 20px 0; text-shadow: 0 0 10px var(--primary); }
        
        /* الأزرار */
        .controls { display: flex; gap: 30px; margin-top: 50px; }
        .btn { width: 90px; height: 90px; border-radius: 50%; border: none; color: #fff; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        #inBtn { background: var(--success); box-shadow: 0 0 15px var(--success); }
        #outBtn { background: var(--danger); box-shadow: 0 0 15px var(--danger); opacity: 0.3; }

        /* التقويم المصغر */
        .calendar-box { background: var(--card); width: 90%; margin-top: 40px; border-radius: 20px; padding: 15px; border: 1px solid #333; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day { background: #1a1a1a; padding: 10px 0; text-align: center; border-radius: 5px; font-size: 0.8rem; border: 1px solid transparent; }
        .day.active { border-color: var(--success); color: var(--success); }

        /* الإعدادات */
        .settings-btn { position: absolute; top: 20px; left: 20px; font-size: 25px; cursor: pointer; }
        #emailInput { width: 80%; padding: 10px; margin-top: 10px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; text-align: center; }
    </style>
</head>
<body onload="initApp()">

    <div id="splash"><h2>CalWork Pro Loading...</h2></div>

    <div class="settings-btn" onclick="toggleSettings()">⚙️</div>

    <div class="container">
        <div style="color: #555;">الوقت الحالي: <span id="clock">00:00:00</span></div>
        <div id="work-timer">00:00:00</div>
        
        <div id="status" style="font-size: 0.9rem; color: #aaa;">جاهز لتسجيل الحضور</div>

        <div class="controls">
            <button id="inBtn" class="btn" onclick="handleAction('in')">IN</button>
            <button id="outBtn" class="btn" onclick="handleAction('out')">OUT</button>
        </div>

        <div id="settingsArea" style="display:none; width: 100%; text-align: center; margin-top: 20px;">
            <input type="email" id="emailInput" placeholder="اكتب إيميلك هنا" onchange="saveEmail(this.value)">
        </div>

        <div class="calendar-box">
            <div class="cal-header">
                <button onclick="changeMonth(-1)" style="background:none; border:none; color:var(--primary); font-size:1.5rem;"><</button>
                <span id="monthTitle">الشهر</span>
                <button onclick="changeMonth(1)" style="background:none; border:none; color:var(--primary); font-size:1.5rem;">></button>
            </div>
            <div class="grid" id="calendarGrid"></div>
        </div>
    </div>

    <script>
    let seconds = 0, timer, currentViewDate = new Date();
    let logs = JSON.parse(localStorage.getItem('calwork_db')) || {};
    const scriptURL = "https://script.google.com/macros/s/AKfycbyBms8jZPDMWeTdZCFySH9nnegrHRAX37bXZ4FDxaqCr52AjD5dSkTaOpZXS4tMtkq0/exec";

    function initApp() {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('emailInput').value = localStorage.getItem('targetEmail') || "";
        
        // تحديث الساعة العادية
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // فحص الذاكرة
        if(localStorage.getItem('isWorkingTime')) {
            let start = new Date(localStorage.getItem('isWorkingTime'));
            seconds = Math.floor((new Date() - start) / 1000);
            resumeWork();
        }
        renderCalendar();
    }

    function handleAction(type) {
        if(type === 'in') {
            if(localStorage.getItem('isWorkingTime')) return;
            localStorage.setItem('isWorkingTime', new Date());
            resumeWork();
        } else {
            if(!localStorage.getItem('isWorkingTime')) return;
            stopWork();
        }
    }

    function resumeWork() {
        document.getElementById('inBtn').style.opacity = '0.3';
        document.getElementById('outBtn').style.opacity = '1';
        document.getElementById('status').innerText = "العداد يعمل الآن...";
        timer = setInterval(updateDisplay, 1000);
    }

    function updateDisplay() {
        seconds++;
        let h=Math.floor(seconds/3600).toString().padStart(2,'0');
        let m=Math.floor((seconds%3600)/60).toString().padStart(2,'0');
        let s=(seconds%60).toString().padStart(2,'0');
        document.getElementById('work-timer').innerText = `${h}:${m}:${s}`;
    }

    function stopWork() {
        clearInterval(timer);
        let start = new Date(localStorage.getItem('isWorkingTime'));
        let end = new Date();
        let total = (seconds / 3600).toFixed(2);
        
        // حفظ في الذاكرة
        const key = `${start.getFullYear()}-${start.getMonth()+1}-${start.getDate()}`;
        logs[key] = { in: start.toLocaleTimeString(), out: end.toLocaleTimeString(), total: total };
        localStorage.setItem('calwork_db', JSON.stringify(logs));

        // إرسال لجوجل
        fetch(scriptURL, {
            method: "POST", mode: "no-cors",
            body: JSON.stringify({
                date: start.toLocaleDateString(),
                in: start.toLocaleTimeString(),
                out: end.toLocaleTimeString(),
                duration: total,
                email: localStorage.getItem('targetEmail') || "no-email"
            })
        });

        localStorage.removeItem('isWorkingTime');
        alert("تم الحفظ والإرسال بنجاح ✅");
        location.reload();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = "";
        const m = currentViewDate.getMonth();
        const y = currentViewDate.getFullYear();
        document.getElementById('monthTitle').innerText = `${m + 1} / ${y}`;
        
        let lastDay = new Date(y, m + 1, 0).getDate();
        for(let i=1; i<=lastDay; i++) {
            let d = document.createElement('div');
            d.className = 'day';
            d.innerText = i;
            if(logs[`${y}-${m+1}-${i}`]) d.className = 'day active';
            grid.appendChild(d);
        }
    }

    function changeMonth(step) {
        currentViewDate.setMonth(currentViewDate.getMonth() + step);
        renderCalendar();
    }

    function saveEmail(v) { localStorage.setItem('targetEmail', v); }
    function toggleSettings() {
        let area = document.getElementById('settingsArea');
        area.style.display = area.style.display === 'none' ? 'block' : 'none';
    }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalWork Pro | Ultimate V19</title>
    <style>
        @font-face { font-family: 'Digital'; src: url('https://fonts.cdnfonts.com/s/14234/DS-DIGI.woff') format('woff'); }
        :root { --primary: #00d2ff; --bg: #000; --card: #121212; --success: #2ecc71; --danger: #ff4b2b; --glow: #39FF14; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; }

        /* شاشات الحماية */
        #splash, #activationOverlay { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        #activationOverlay { z-index: 10000; display: none; }
        .act-box { background: var(--card); border: 1px solid var(--primary); padding: 30px; border-radius: 25px; width: 85%; text-align: center; }
        .act-input { background: #000; border: 1px solid #333; color: var(--primary); padding: 15px; border-radius: 12px; width: 100%; margin: 20px 0; text-align: center; font-size: 1.5rem; }
        
        /* القائمة الجانبية (الترس) */
        .settings-icon { position: absolute; top: 20px; left: 20px; font-size: 26px; color: #555; z-index: 2000; cursor: pointer; }
        .side-menu { position: fixed; top: -100%; left: 0; width: 100%; background: var(--card); transition: 0.5s; padding: 25px; z-index: 3000; border-bottom: 2px solid var(--primary); border-radius: 0 0 25px 25px; box-sizing: border-box; }
        .side-menu.active { top: 0; }

        /* الساعة والعداد */
        .clock-container { position: relative; width: 180px; height: 180px; margin-top: 20px; border-radius: 50%; border: 2px solid #222; }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; }
        .hour-hand { width: 6px; height: 40px; background: #fff; }
        .min-hand { width: 4px; height: 60px; background: var(--glow); }
        .sec-hand { width: 2px; height: 70px; background: var(--danger); }
        
        #work-timer { font-family: 'Digital', sans-serif; font-size: 4rem; color: var(--primary); margin: 15px 0; }
        
        /* الطبقات المنبثقة (Modals) */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; justify-content: center; align-items: center; z-index: 4000; }
        .modal-box { background: var(--card); border: 1px solid #333; border-radius: 25px; padding: 20px; width: 90%; text-align: center; }
        
        /* التقويم داخل المودال */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .day-btn { background: #1a1a1a; border: 1px solid #333; padding: 10px 0; border-radius: 8px; font-size: 11px; }
        .day-btn.has-data { border-color: var(--success); color: var(--success); }

        .num-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .num-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 12px; font-size: 1.2rem; }

        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #1a1a1a; border: 1px solid var(--primary); padding: 12px 25px; border-radius: 50px; z-index: 5000; transition: 0.5s; }
        #toast.show { bottom: 30px; }
    </style>
</head>
<body onload="initApp()">

    <div id="splash"><h1>CalWork Pro</h1></div>

    <div id="activationOverlay">
        <div class="act-box">
            <h2 style="color:var(--primary)">تنشيط النسخة</h2>
            <input type="text" id="activationKeyInput" class="act-input" placeholder="0000">
            <button onclick="checkActivation()" style="background:var(--primary); padding:15px; width:100%; border:none; border-radius:12px; font-weight:bold;">تنشيط</button>
        </div>
    </div>

    <div class="settings-icon" onclick="toggleMenu()">⚙️</div>

    <div id="sideMenu" class="side-menu">
        <div onclick="openCalendar()" style="padding:15px; border-bottom:1px solid #222">📅 سجل الحضور والتقويم</div>
        <div style="padding:10px 0">
            <label style="font-size:12px; color:var(--primary)">إيميل البيانات:</label>
            <input type="email" id="targetEmail" onchange="localStorage.setItem('targetEmail', this.value)" placeholder="example@mail.com" style="width:100%; background:#000; color:#fff; padding:10px; border:1px solid #333; text-align:center; border-radius:10px">
        </div>
        <div style="border-top:1px solid #333; padding-top:10px">
            <label style="font-size:10px; color:#555">كود تفعيل النسخ الجديدة:</label>
            <input type="text" id="masterKeyInput" onchange="updateActivationKey(this.value)" style="width:100%; background:#000; color:#fff; padding:8px; border:1px dashed #333; text-align:center">
        </div>
        <div onclick="toggleMenu()" style="padding:15px; color:var(--danger); text-align:center">✕ إغلاق</div>
    </div>

    <div class="clock-container" id="analogClock">
        <div id="hour" class="hand hour-hand"></div>
        <div id="min" class="hand min-hand"></div>
        <div id="sec" class="hand sec-hand"></div>
    </div>

    <div id="work-timer">00:00:00</div>

    <div style="display:flex; gap:30px; margin-top:auto; padding-bottom:50px">
        <button id="inBtn" style="width:85px; height:85px; border-radius:50%; background:var(--success); color:#fff; border:none; font-weight:bold; box-shadow: 0 0 20px rgba(46, 204, 113, 0.3);" onclick="askPIN('in')">IN</button>
        <button id="outBtn" style="width:85px; height:85px; border-radius:50%; background:var(--danger); color:#fff; border:none; font-weight:bold; opacity:0.3" onclick="askPIN('out')">OUT</button>
    </div>

    <div id="pinOverlay" class="overlay"><div class="modal-box">
        <h3>PIN التحقق</h3>
        <div id="pinDots" style="font-size:2rem; color:var(--primary); margin:10px; letter-spacing:8px"></div>
        <div class="num-pad">
            <button class="num-btn" onclick="pressNum(1)">1</button><button class="num-btn" onclick="pressNum(2)">2</button><button class="num-btn" onclick="pressNum(3)">3</button>
            <button class="num-btn" onclick="pressNum(4)">4</button><button class="num-btn" onclick="pressNum(5)">5</button><button class="num-btn" onclick="pressNum(6)">6</button>
            <button class="num-btn" onclick="pressNum(7)">7</button><button class="num-btn" onclick="pressNum(8)">8</button><button class="num-btn" onclick="pressNum(9)">9</button>
            <button class="num-btn" onclick="closeModals()">✕</button><button class="num-btn" onclick="pressNum(0)">0</button><button class="num-btn" onclick="currentPIN=''">⌫</button>
        </div>
    </div></div>

    <div id="logOverlay" class="overlay"><div class="modal-box" style="width:95%">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <button onclick="changeMonth(-1)" style="background:none; border:none; color:var(--primary); font-size:1.5rem;"><</button>
            <h3 id="calHeader" style="margin:0"></h3>
            <button onclick="changeMonth(1)" style="background:none; border:none; color:var(--primary); font-size:1.5rem;">></button>
        </div>
        <div class="calendar-grid" id="grid"></div>
        <div id="dayInfo" style="margin-top:15px; color:#aaa; font-size: 13px; background:#000; padding:10px; border-radius:10px">اختر يوماً للعرض</div>
        <button onclick="closeModals()" style="width:100%; padding:15px; background:var(--danger); border:none; color:#fff; border-radius:15px; margin-top:15px;">إغلاق</button>
    </div></div>

    <div id="toast"></div>

    <script>
    let timer, seconds=0, currentPIN="", targetAction="", appPass="1234";
    let logs=JSON.parse(localStorage.getItem('calwork_db'))||{};
    let masterKey = localStorage.getItem('masterActivationKey') || "2026";
    let currentViewDate = new Date();
    const scriptURL = "https://script.google.com/macros/s/AKfycbyBms8jZPDMWeTdZCFySH9nnegrHRAX37bXZ4FDxaqCr52AjD5dSkTaOpZXS4tMtkq0/exec";

    function initApp() {
        setInterval(updateClock, 1000);
        if (!localStorage.getItem('isActivated')) {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('activationOverlay').style.display = 'flex';
            return;
        }
        document.getElementById('targetEmail').value = localStorage.getItem('targetEmail') || "";
        document.getElementById('masterKeyInput').value = masterKey;
        if(localStorage.getItem('isWorkingTime')) {
            window.entryTime = new Date(localStorage.getItem('isWorkingTime'));
            seconds = Math.floor((new Date() - window.entryTime) / 1000);
            resumeTimer();
        }
        setTimeout(() => { document.getElementById('splash').style.display='none'; }, 1000);
    }

    function updateClock() {
        const n = new Date();
        const h=n.getHours()%12, m=n.getMinutes(), s=n.getSeconds();
        document.getElementById('hour').style.transform=`translateX(-50%) rotate(${h*30+m*0.5}deg)`;
        document.getElementById('min').style.transform=`translateX(-50%) rotate(${m*6}deg)`;
        document.getElementById('sec').style.transform=`translateX(-50%) rotate(${s*6}deg)`;
    }

    function checkActivation() {
        if (document.getElementById('activationKeyInput').value === masterKey) {
            localStorage.setItem('isActivated', 'true');
            location.reload();
        } else { alert("كود خطأ"); }
    }

    function updateActivationKey(v) { localStorage.setItem('masterActivationKey', v); showToast("تم تحديث الكود الرئيسي"); }
    function askPIN(a) { targetAction=a; document.getElementById('pinOverlay').style.display='flex'; }
    function pressNum(n) { 
        if(currentPIN.length < 4) {
            currentPIN += n;
            document.getElementById('pinDots').innerText = "*".repeat(currentPIN.length);
            if(currentPIN.length === 4) {
                if(currentPIN === appPass) { closeModals(); targetAction==='in'?startWork():stopWork(); }
                else { showToast("PIN خطأ"); currentPIN=""; document.getElementById('pinDots').innerText=""; }
            }
        }
    }

    function startWork() {
        window.entryTime = new Date();
        localStorage.setItem('isWorkingTime', window.entryTime);
        resumeTimer();
        showToast("تم تسجيل الدخول");
    }

    function resumeTimer() {
        document.getElementById('inBtn').style.opacity='0.3'; document.getElementById('outBtn').style.opacity='1';
        if(timer) clearInterval(timer);
        timer = setInterval(() => {
            seconds++;
            let h=Math.floor(seconds/3600).toString().padStart(2,'0'),
                m=Math.floor((seconds%3600)/60).toString().padStart(2,'0'),
                s=(seconds%60).toString().padStart(2,'0');
            document.getElementById('work-timer').innerText = `${h}:${m}:${s}`;
        }, 1000);
    }

    function stopWork() {
        clearInterval(timer);
        const now = new Date();
        let t = (seconds/3600).toFixed(2);
        const key = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;
        logs[key] = { in: window.entryTime.toLocaleTimeString(), out: now.toLocaleTimeString(), total: t };
        localStorage.setItem('calwork_db', JSON.stringify(logs));
        
        fetch(scriptURL, { method: "POST", mode: "no-cors", body: JSON.stringify({
            date: window.entryTime.toLocaleDateString('en-GB'),
            in: window.entryTime.toLocaleTimeString(),
            out: now.toLocaleTimeString(),
            duration: t,
            email: document.getElementById('targetEmail').value
        })});

        localStorage.removeItem('isWorkingTime');
        showToast("تم الحفظ والإرسال ✅");
        setTimeout(() => location.reload(), 2000);
    }

    function openCalendar() { toggleMenu(); document.getElementById('logOverlay').style.display='flex'; renderCycle(); }
    function changeMonth(step) { currentViewDate.setMonth(currentViewDate.getMonth() + step); renderCycle(); }
    function renderCycle() {
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        const monthNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
        document.getElementById('calHeader').innerText = `${monthNames[currentViewDate.getMonth()]} ${currentViewDate.getFullYear()}`;
        let y = currentViewDate.getFullYear(), m = currentViewDate.getMonth();
        let lastDay = new Date(y, m + 1, 0).getDate();
        for(let i=1; i<=lastDay; i++) {
            const btn = document.createElement('div'); btn.className = 'day-btn'; btn.innerText = i;
            if(logs[`${y}-${m+1}-${i}`]) btn.classList.add('has-data');
            btn.onclick = () => {
                const log = logs[`${y}-${m+1}-${i}`];
                document.getElementById('dayInfo').innerHTML = log ? `حضور: ${log.in} | انصراف: ${log.out} <br> مدة العمل: ${log.total} ساعة` : "لا توجد سجلات";
            };
            grid.appendChild(btn);
        }
    }

    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }
    function closeModals() { document.querySelectorAll('.overlay').forEach(o=>o.style.display='none'); currentPIN=""; document.getElementById('pinDots').innerText=""; }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalWork Pro</title>
    <style>
        :root { --primary: #00d2ff; --bg: #000; --card: #111; --danger: #ff4b2b; --success: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* الهيدر والترس */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 1px solid #222; }
        .settings-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 22px; transition: 0.3s; padding: 5px; }
        .settings-btn:hover { color: var(--primary); transform: rotate(90deg); }

        /* القائمة الانسيابية */
        .menu { position: fixed; top: -100%; left: 0; width: 100%; background: var(--card); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px; border-radius: 0 0 25px 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.9); z-index: 90; border-bottom: 2px solid var(--primary); }
        .menu.active { top: 0; }
        .menu-item { padding: 18px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; font-size: 16px; color: #ccc; }
        .menu-item:active { background: #1a1a1a; }

        /* حالة العمل (Status Pill) */
        .status-pill { background: #1a1a1a; padding: 6px 30px; border-radius: 50px; font-size: 14px; font-weight: bold; margin: 20px auto 10px; border: 1px solid #333; transition: 0.4s; text-align: center; width: fit-content; }
        .status-pill.working { border-color: var(--success); color: var(--success); box-shadow: 0 0 15px rgba(46,204,113,0.1); }
        .status-pill.off { border-color: var(--danger); color: var(--danger); }

        /* العداد (التايمر) */
        .timer-card { background: var(--card); margin: 10px auto; padding: 35px 15px; border-radius: 20px; width: 88%; text-align: center; border: 1px solid #222; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        #work-timer { font-size: 3.8rem; font-family: 'Courier New', monospace; font-weight: bold; color: var(--primary); text-shadow: 0 0 10px rgba(0,210,255,0.2); }

        /* الجدول المركزي */
        .log-container { width: 90%; margin: 15px auto; flex-grow: 1; overflow-y: auto; background: var(--card); border-radius: 15px; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th { background: #1a1a1a; padding: 12px; color: var(--primary); font-size: 12px; border-bottom: 2px solid #222; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 14px; font-family: 'Arial'; color: #bbb; }

        /* زر البصمة المطور */
        .footer { padding: 25px 0 40px; text-align: center; }
        .fp-btn { background: #111; border: 2px solid #333; width: 85px; height: 85px; border-radius: 50%; cursor: pointer; margin: 0 auto; display: flex; align-items: center; justify-content: center; transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.6); position: relative; }
        .fp-btn.active { border-color: var(--primary); box-shadow: 0 0 30px rgba(0,210,255,0.3); }
        .fp-btn svg { fill: #444; transition: 0.3s; width: 45px; height: 45px; }
        .fp-btn.active svg { fill: var(--primary); }
		/* كود إخفاء شريط الموقع المجاني */
#tiiny-host-badge, .tiiny-host-badge, [id*="tiiny"], [class*="tiiny"] {
    display: none !important;
    visibility: hidden !important;
    opacity: 0 !important;
    pointer-events: none !important;  }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: bold; font-size: 18px; color: #666;">CalWork <span style="color:var(--primary)">Pro</span></div>
        <button class="settings-btn" onclick="toggleMenu()">⚙️</button>
    </div>

    <div id="settingsMenu" class="menu">
        <div class="menu-item" onclick="alert('سجل التقويم سيتم تفعيله في التحديث القادم')">📅 سجل الحضور (تقويم)</div>
        <div class="menu-item" onclick="toggleTimeFormat()">🕒 نظام الوقت (12h / 24h)</div>
        <div class="menu-item" onclick="toggleMenu()" style="color:var(--danger); font-weight: bold;">❌ إغلاق</div>
    </div>

    <div id="status" class="status-pill off">لا يعمل</div>

    <div class="timer-card">
        <div id="work-timer">00:00:00</div>
    </div>

    <div class="log-container">
        <table>
            <thead>
                <tr>
                    <th>اليوم الفعلي</th>
                    <th>وقت الحضور</th>
                    <th>مدة العمل</th>
                </tr>
            </thead>
            <tbody id="logs"></tbody>
        </table>
    </div>

    <div class="footer">
        <button id="fpBtn" class="fp-btn" onclick="handleFingerprint()">
            <svg viewBox="0 0 24 24" width="50" height="50">
                <path d="M12,2C11.07,2 10.15,2.15 9.27,2.44C8.75,2.61 8.47,3.18 8.64,3.7C8.81,4.22 9.38,4.5 9.9,4.33C10.58,4.11 11.29,4 12,4C16.41,4 20,7.59 20,12C20,12.55 20.45,13 21,13C21.55,13 22,12.55 22,12C22,6.48 17.52,2 12,2M1,12C1,13.84 1.5,15.56 2.38,17.04C2.65,17.5 3.25,17.65 3.71,17.37C4.17,17.1 4.32,16.5 4.04,16.04C3.37,14.91 3,13.5 3,12C3,7.04 7.04,3 12,3C12.55,3 13,2.55 13,2C13,1.45 12.55,1 12,1C5.92,1 1,5.92 1,12M12,7C9.24,7 7,9.24 7,12V17C7,17.55 7.45,18 8,18C8.55,18 9,17.55 9,17V12C9,10.34 10.34,9 12,9C13.66,9 15,10.34 15,12V17C15,18.66 16.34,20 18,20C18.55,20 19,19.55 19,19C19,18.45 18.55,18 18,18C17.17,18 16.5,17.33 16.5,16.5V12C16.5,9.5 14.5,7.5 12,7.5M12,11C11.45,11 11,11.45 11,12V17C11,17.55 11.45,18 12,18C12.55,18 13,17.55 13,17V12C13,11.45 12.55,11 12,11Z" />
            </svg>
        </button>
    </div>

    <script>
        let isWorking = false;
        let timerInterval;
        let totalSeconds = 0;
        let timeFormat24 = true;

        function toggleMenu() { document.getElementById('settingsMenu').classList.toggle('active'); }

        function toggleTimeFormat() { 
            timeFormat24 = !timeFormat24; 
            alert("تم تحويل نظام الوقت لـ " + (timeFormat24 ? "24 ساعة" : "12 ساعة"));
            toggleMenu();
        }

        function handleFingerprint() {
            isWorking = !isWorking;
            const statusPill = document.getElementById('status');
            const fpBtn = document.getElementById('fpBtn');
            const now = new Date();

            if (isWorking) {
                statusPill.innerText = "جاري العمل";
                statusPill.className = "status-pill working";
                fpBtn.classList.add('active');
                totalSeconds = 0;
                startTimer();
                window.lastIn = now;
            } else {
                statusPill.innerText = "لا يعمل";
                statusPill.className = "status-pill off";
                fpBtn.classList.remove('active');
                stopTimer();
                addLog(window.lastIn, document.getElementById('work-timer').innerText);
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                totalSeconds++;
                let h = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
                let m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
                let s = (totalSeconds % 60).toString().padStart(2, '0');
                document.getElementById('work-timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function stopTimer() { clearInterval(timerInterval); }

        function addLog(startTime, duration) {
            const days = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            const dayName = days[startTime.getDay()];
            
            let hours = startTime.getHours();
            let mins = startTime.getMinutes().toString().padStart(2, '0');
            let period = "";
            
            if (!timeFormat24) {
                period = hours >= 12 ? " م" : " ص";
                hours = hours % 12 || 12;
            }
            const timeStr = `${hours}:${mins}${period}`;

            const row = `<tr><td>${dayName}</td><td>${timeStr}</td><td>${duration}</td></tr>`;
            document.getElementById('logs').innerHTML = row + document.getElementById('logs').innerHTML;
        }
    </script>
	<script>
    // كود سحري لمسح أي علامة مائية للموقع مجاناً
    setInterval(() => {
        const badge = document.querySelector('a[href*="tiiny.host"]');
        if (badge) {
            badge.parentElement.remove(); // بيمسح الشريط وأي حاجة تبع الموقع
        }
        // تأكيد إضافي بالـ CSS
        const allDivs = document.querySelectorAll('div');
        allDivs.forEach(div => {
            if (div.innerText.includes('tiiny.host') || div.innerHTML.includes('tiiny')) {
                div.style.display = 'none';
            }
        });
    }, 100); // بيفحص الصفحة كل جزء من عشرة من الثانية ويمسحها فوراً
</script>
</body>
</html>
